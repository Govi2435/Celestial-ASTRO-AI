name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run strict TypeScript check
        run: npm run typecheck

  migration-drift:
    name: Migration drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Replay migrations and verify schema baseline
        run: npm run db:validate

  test:
    name: Unit, build, and rendered HTML
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Record tool versions
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verified test suite with captured evidence
        id: test_suite
        run: npm run test:ci

      - name: Validate test artifact safety
        id: artifact_safety
        if: ${{ always() }}
        run: npm run artifact:validate

      - name: Upload test evidence
        if: ${{ always() && steps.artifact_safety.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/test
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
          include-hidden-files: false
