name: ASTRO-104 claim cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/astro-104-claim-integrity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Apply claim-integrity cleanup
        run: python3 scripts/astro-104-claim-cleanup.py
      - name: Install dependencies
        run: npm ci
      - name: Run full verification
        run: npm test
      - name: Commit final product changes
        run: |
          rm .github/workflows/astro-104-pr-cleanup.yml
          rm scripts/astro-104-claim-cleanup.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(ASTRO-104): enforce claim integrity"
          git push origin HEAD:docs/astro-104-claim-integrity
